services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: ./api
    command: pnpm db:deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "4001:${PORT:-3001}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      HOST: ${HOST:-0.0.0.0}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NFP_USUARIO: ${NFP_USUARIO:-}
      NFP_SENHA: ${NFP_SENHA:-}
      NFP_CNPJ: ${NFP_CNPJ:-}
      NFP_CATEGORIA: ${NFP_CATEGORIA:-}
      ZAPNIT_BASE_URL: ${ZAPNIT_BASE_URL:-}
      ZAPNIT_INSTANCE_ID: ${ZAPNIT_INSTANCE_ID:-}
      ZAPNIT_CLIENT_TOKEN: ${ZAPNIT_CLIENT_TOKEN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  app:
    build:
      context: ./app
      args:
        - NEXT_PUBLIC_API_URL
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - api

volumes:
  db_data:
